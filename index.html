<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Regalo Especial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Raleway:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Raleway', sans-serif;
      background: #0a0a0f;
      color: #fff;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    .sun {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffcc00, #ff6600);
      box-shadow: 0 0 40px #ffcc00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      z-index: 2;
    }
    .planet {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #a64aff, #4a1a7f);
      box-shadow: 0 0 15px #a64aff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .planet:hover {
      box-shadow: 0 0 30px #ff66cc;
      transform: scale(1.1);
    }
    .planet span {
      position: absolute;
      top: -30px;
      font-size: 14px;
      font-family: 'Orbitron', sans-serif;
      color: #ff99ff;
    }
    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-content {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 0 20px #ff66cc;
      color: #fff;
      font-size: 18px;
      line-height: 1.6;
    }
    .close {
      margin-top: 15px;
      display: inline-block;
      padding: 8px 16px;
      background: #ff66cc;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      .sun {
        width: 80px;
        height: 80px;
        font-size: 18px;
      }
      .planet {
        width: 40px;
        height: 40px;
      }
      .planet span {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <canvas id="space"></canvas>
  <div class="sun">Tú</div>
  <div class="planet" id="planet1"><span>Momentos</span></div>
  <div class="planet" id="planet2"><span>Gravedad</span></div>
  <div class="planet" id="planet3"><span>Deseos</span></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modal-content">
      <div class="close" id="close">Cerrar</div>
    </div>
  </div>

  <script>
    // Fondo espacial con estrellas
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    for (let i = 0; i < 150; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        alpha: Math.random(),
        delta: Math.random() * 0.02 + 0.01
      });
    }
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      stars.forEach(star => {
        ctx.globalAlpha = star.alpha;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
        star.alpha += star.delta;
        if (star.alpha <= 0 || star.alpha >= 1) star.delta = -star.delta;
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // Planetas orbitando
    const planets = [
      { el: document.getElementById('planet1'), radius: 150, speed: 0.01, angle: 0, message: "Cada momento contigo es un universo de alegría." },
      { el: document.getElementById('planet2'), radius: 220, speed: 0.008, angle: 0, message: "Tu gravedad me atrae, y no quiero escapar." },
      { el: document.getElementById('planet3'), radius: 300, speed: 0.006, angle: 0, message: "Mis deseos giran siempre alrededor de ti." }
    ];
    function animatePlanets() {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      planets.forEach(p => {
        p.angle += p.speed;
        const x = centerX + p.radius * Math.cos(p.angle);
        const y = centerY + p.radius * Math.sin(p.angle);
        p.el.style.left = (x - p.el.offsetWidth / 2) + 'px';
        p.el.style.top = (y - p.el.offsetHeight / 2) + 'px';
      });
      requestAnimationFrame(animatePlanets);
    }
    animatePlanets();

    // Modal interactividad
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const closeBtn = document.getElementById('close');
    planets.forEach(p => {
      p.el.addEventListener('click', () => {
        modalContent.innerHTML = "<p>" + p.message + "</p><div class='close' id='close'>Cerrar</div>";
        modal.style.display = 'flex';
        document.getElementById('close').addEventListener('click', () => {
          modal.style.display = 'none';
        });
      });
    });
  </script>
</body>
</html>

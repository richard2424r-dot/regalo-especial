<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Universo con Canvas</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #0b0033, #000);
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="universo"></canvas>

  <script>
    // Ajustar canvas al tamaño de la ventana
    const canvas = document.getElementById("universo");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Constructor Point
    function Point(x, y) {
      this.x = (typeof x !== 'undefined') ? x : 0;
      this.y = (typeof y !== 'undefined') ? y : 0;
    }

    // Método para clonar
    Point.prototype.clone = function () {
      return new Point(this.x, this.y);
    };

    // Dibujar estrella
    Point.prototype.drawStar = function () {
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
      ctx.fill();
    };

    // Generar muchas estrellas
    let estrellas = [];
    for (let i = 0; i < 150; i++) {
      let p = new Point(Math.random() * canvas.width, Math.random() * canvas.height);
      estrellas.push(p);
    }

    // Dibujar todas las estrellas
    function dibujarUniverso() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      estrellas.forEach(e => e.drawStar());
    }

    // Animación de estrellas fugaces
    function crearFugaz() {
      let start = new Point(Math.random() * canvas.width, Math.random() * canvas.height / 2);
      let end = new Point(start.x + 200, start.y + 200);

      let paso = 0;
      function animar() {
        if (paso > 1) return;
        let x = start.x + (end.x - start.x) * paso;
        let y = start.y + (end.y - start.y) * paso;
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(x, y);
        ctx.stroke();
        paso += 0.02;
        requestAnimationFrame(animar);
      }
      animar();
    }

    // Loop de animación
    function loop() {
      dibujarUniverso();
      if (Math.random() < 0.02) { // probabilidad de fugaz
        crearFugaz();
      }
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atardecer mágico</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to top, #ff9966, #ff5e62);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="paisaje"></canvas>

  <script>
    const canvas = document.getElementById("paisaje");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 🌳 Árbol rosa
    function dibujarArbol() {
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(canvas.width / 2 - 10, canvas.height - 200, 20, 200);
      for (let i = 0; i < 200; i++) {
        const x = canvas.width / 2 + (Math.random() - 0.5) * 300;
        const y = canvas.height - 200 - Math.random() * 300;
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, ${150 + Math.random() * 100}, ${200 + Math.random() * 55}, 0.9)`;
        ctx.fill();
      }
    }

    // 🍃 Hojas cayendo
    let hojas = [];
    for (let i = 0; i < 50; i++) {
      hojas.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 5 + 2,
        s: Math.random() * 2 + 1
      });
    }

    function moverHojas() {
      hojas.forEach(h => {
        h.y += h.s;
        if (h.y > canvas.height) h.y = -10;
        ctx.beginPath();
        ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,182,193,0.8)";
        ctx.fill();
      });
    }

    // 🌠 Estrella fugaz
    function estrellaFugaz() {
      let x = Math.random() * canvas.width;
      let y = Math.random() * canvas.height / 2;
      let dx = 10, dy = 5;
      let longitud = 0;

      function animar() {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - longitud, y - longitud / 2);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
        x += dx;
        y += dy;
        longitud += 5;
        if (x < canvas.width && y < canvas.height) {
          requestAnimationFrame(animar);
        }
      }
      animar();
    }

    // 👫 Pareja mirando el atardecer
    function dibujarPareja() {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(canvas.width / 2 - 60, canvas.height - 100, 40, 100);
      ctx.fillRect(canvas.width / 2 + 20, canvas.height - 100, 40, 100);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2 - 20, canvas.height - 50);
      ctx.lineTo(canvas.width / 2 + 20, canvas.height - 50);
      ctx.strokeStyle = "rgba(0,0,0,0.6)";
      ctx.lineWidth = 5;
      ctx.stroke();
    }

    // 🌇 Animación general
    function animar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dibujarArbol();
      moverHojas();
      dibujarPareja();
      if (Math.random() < 0.01) estrellaFugaz();
      requestAnimationFrame(animar);
    }

    animar();
  </script>
</body>
</html>

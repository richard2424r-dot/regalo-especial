<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universo mágico</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #0b0033, #000);
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 3em;
      color: #ffccff;
      text-shadow: 0 0 20px #ff66ff;
    }

    /* Planeta */
    .planeta {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 30%, #ff66ff, #330066);
      border-radius: 50%;
      box-shadow: 0 0 60px #ff66ff;
      transform: translate(-50%, -50%);
      animation: girar 20s linear infinite;
    }

    @keyframes girar {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Estrellas */
    .estrella {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: brillar 2s infinite alternate;
    }

    @keyframes brillar {
      from { opacity: 0.3; transform: scale(1); }
      to { opacity: 1; transform: scale(1.5); }
    }

    /* Estrellas fugaces */
    .fugaz {
      position: absolute;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, white, transparent);
      animation: caer 3s linear infinite;
    }

    @keyframes caer {
      from { transform: translate(0, 0); opacity: 1; }
      to { transform: translate(600px, 600px); opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>✨ Universo lleno de sueños ✨</h1>
  <div class="planeta"></div>

  <!-- Música de fondo -->
  <audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
  </audio>

  <script>
    // Generar muchas estrellas
    for (let i = 0; i < 150; i++) {
      let estrella = document.createElement("div");
      estrella.className = "estrella";
      estrella.style.top = Math.random() * 100 + "%";
      estrella.style.left = Math.random() * 100 + "%";
      document.body.appendChild(estrella);
    }

    // Generar muchas estrellas fugaces
    for (let i = 0; i < 30; i++) {
      let fugaz = document.createElement("div");
      fugaz.className = "fugaz";
      fugaz.style.top = Math.random() * 100 + "%";
      fugaz.style.left = Math.random() * 100 + "%";
      fugaz.style.animationDelay = (Math.random() * 10) + "s";
      document.body.appendChild(fugaz);
    }
  </script>
</body>
</html>
